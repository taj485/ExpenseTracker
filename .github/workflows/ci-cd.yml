name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish API
        run: dotnet publish ExpenseTrackerAPI/ExpenseTrackerAPI.csproj --no-build --configuration Release -o ./publish

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish

  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json

      - name: Install
        run: npm ci
        working-directory: Client

      - name: Build
        run: npm run build
        working-directory: Client

      - name: Test
        run: npm test
        working-directory: Client

      - name: Upload SPA build artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-dist
          path: Client/dist/expense-tracker/browser

  deploy-api:
    name: Deploy API to App Service
    needs: [backend, frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download API build artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.API_APP_NAME }}
          package: ./publish

  deploy-spa:
    name: Deploy SPA to Static Web App
    needs: [backend, frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download SPA build artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-dist
          path: ./spa-dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./spa-dist
          skip_app_build: true
