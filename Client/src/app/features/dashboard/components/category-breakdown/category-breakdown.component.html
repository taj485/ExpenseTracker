<div class="breakdown-list">
  @for (stat of stats; track stat.category) {
    <div class="breakdown-row clickable" (click)="viewCategory(stat.category)">
      <div class="cat-icon" [style.background]="getCategoryMeta(stat.category).bgColor">
        {{ getCategoryMeta(stat.category).icon }}
      </div>

      <div class="cat-info">
        <div class="cat-name">{{ stat.category }}</div>
        <div class="cat-bar-track">
          <div
            class="cat-bar-fill"
            [style.width.%]="stat.percentage"
            [style.background]="getCategoryMeta(stat.category).barColor"
          ></div>
        </div>
      </div>

      <div class="cat-right">
        <div class="cat-amount">£{{ stat.total | number:'1.2-2' }}</div>
        <div class="cat-count">{{ stat.count }} transaction{{ stat.count !== 1 ? 's' : '' }}</div>
      </div>
    </div>
  }

  @empty {
    <p class="empty">No expenses this month yet.</p>
  }
</div>
