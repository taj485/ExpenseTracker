@if (step() === 'form') {
  <div class="form-panel">
    <h2 class="form-title">Add Expense</h2>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-group">
        <label for="amount">Amount (£)</label>
        <input
          id="amount"
          type="number"
          step="0.01"
          min="0.01"
          placeholder="0.00"
          [value]="amount()"
          (input)="amount.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select
          id="category"
          [value]="category()"
          (change)="category.set($any($event.target).value)"
        >
          @for (cat of categories; track cat) {
            <option [value]="cat">{{ cat }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input
          id="date"
          type="date"
          [max]="maxDate"
          [value]="date()"
          (input)="date.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <input
          id="description"
          type="text"
          placeholder="What did you spend on?"
          [value]="description()"
          (input)="description.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="merchant">Merchant (optional)</label>
        <input
          id="merchant"
          type="text"
          placeholder="Where did you spend?"
          [value]="merchant()"
          (input)="merchant.set($any($event.target).value)"
        />
      </div>

      @if (formError()) {
        <p class="form-error">{{ formError() }}</p>
      }

      <button type="submit" class="btn-submit">Add Expense</button>
    </form>
  </div>
} @else {
  @if (formError()) {
    <p class="form-error">{{ formError() }}</p>
  }
  <app-select-tables-prompt
    [submitting]="submitting()"
    (confirmed)="onTablesConfirmed($event)"
    (cancelled)="onTablesCancelled()"
  />
}
