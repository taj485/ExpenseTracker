<div class="app">
  <div class="sidebar-overlay" [class.open]="sidebarOpen()" (click)="sidebarOpen.set(false)"></div>

  <app-sidebar [isOpen]="sidebarOpen()" (close)="sidebarOpen.set(false)" />

  <div class="main-wrapper">
    <app-topbar
      [pageTitle]="pageTitle()"
      (menuClicked)="sidebarOpen.set(true)"
    />

    <div class="content">
      <div class="page-area">
        <router-outlet (activate)="onRouteActivated($event)" />
      </div>

      <!-- Add Expense panel — desktop -->
      <aside class="add-panel">
        <app-add-expense-form (submitted)="drawer.close()" />
      </aside>
    </div>

    <!-- Bottom tab bar — mobile -->
    <div class="mobile-footer">
      <a class="tab-item" routerLink="/dashboard" routerLinkActive="active">
        <span class="tab-icon">📊</span>
        <span class="tab-label">Dashboard</span>
      </a>
      <a class="tab-item" routerLink="/expenses" routerLinkActive="active">
        <span class="tab-icon">📋</span>
        <span class="tab-label">Expenses</span>
      </a>
      <button type="button" class="tab-item" [class.active]="drawer.isOpen()" (click)="drawer.open()">
        <span class="tab-icon">➕</span>
        <span class="tab-label">Add</span>
      </button>
      <button type="button" class="tab-item" [class.active]="uploadDrawer.isOpen()" (click)="uploadDrawer.open()">
        <span class="tab-icon">📷</span>
        <span class="tab-label">Receipt</span>
      </button>
    </div>
  </div>
</div>

<!-- Add Expense drawer — mobile -->
@if (drawer.isOpen()) {
  <div class="drawer-overlay" (click)="drawer.close()">
    <div class="drawer" appDragToDismiss (dismissed)="drawer.close()" (click)="$event.stopPropagation()">
      <div class="drawer-handle"></div>
      <app-add-expense-form (submitted)="drawer.close()" />
    </div>
  </div>
}

<!-- Upload Receipt drawer — mobile -->
@if (uploadDrawer.isOpen()) {
  <div class="drawer-overlay" (click)="uploadDrawer.close()">
    <div class="drawer" appDragToDismiss (dismissed)="uploadDrawer.close()" (click)="$event.stopPropagation()">
      <div class="drawer-handle"></div>
      <app-upload-receipt />
    </div>
  </div>
}
