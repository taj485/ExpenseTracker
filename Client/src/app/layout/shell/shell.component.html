<div class="app">
  <div class="sidebar-overlay" [class.open]="sidebarOpen()" (click)="sidebarOpen.set(false)"></div>

  <app-sidebar [isOpen]="sidebarOpen()" (close)="sidebarOpen.set(false)" />

  <div class="main-wrapper">
    <app-topbar
      [pageTitle]="pageTitle()"
      (menuClicked)="sidebarOpen.set(true)"
    />

    <div class="content">
      <div class="page-area">
        <router-outlet (activate)="onRouteActivated($event)" />
      </div>

      <!-- Add Expense panel — desktop -->
      <aside class="add-panel">
        <app-add-expense-form (submitted)="drawer.close()" />
      </aside>
    </div>

    <!-- Add Expense footer — mobile -->
    <div class="mobile-footer">
      <button class="btn-add-expense-mobile" (click)="drawer.open()">+ Add Expense</button>
    </div>
  </div>
</div>

<!-- Add Expense drawer — mobile -->
@if (drawer.isOpen()) {
  <div class="drawer-overlay" (click)="drawer.close()">
    <div class="drawer" (click)="$event.stopPropagation()">
      <div class="drawer-handle"></div>
      <app-add-expense-form (submitted)="drawer.close()" />
    </div>
  </div>
}
